api.error.unauthorized: 'Сначала `login`, затем заголовок `Authorization: Bearer <session_id>` (или поле `session_id` в JSON). При `php -S`, если Bearer не доходит, используйте заголовок `X-Session-Token: <session_id>` или выполните `login` снова на том же запущенном сервере (каждый `login` выдаёт новый токен). Если токен пропал между запросами или после перезапуска, не задавайте пустой `SESSION_MEMORY_SYNC_FILE=` — по умолчанию сессии пишутся в `.data/session-memory.json`.'
