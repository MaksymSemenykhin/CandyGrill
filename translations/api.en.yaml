api.error.missing_command: 'Field `command` is required.'
api.error.unknown_command: 'Unknown command.'
api.error.database_not_configured: 'Database is not configured.'
api.error.database_error: 'Database query failed. Apply Phinx migrations so `users` (`public_id`, `status`, …) and `characters` (fights, skill_1..3, etc.) match the code — e.g. `./sail composer migrate` from the project root in WSL.'
api.error.unknown_player: 'Unknown or inactive player.'
api.error.session_issue_disabled: 'Token issuance is disabled (set SESSION_ALLOW_ISSUE=1 in development only).'
api.error.invalid_user_id: 'Field `user_id` must be a positive integer or a `player_id` UUID from `register`.'
api.error.unauthorized: 'Authenticate with `login`, then send `Authorization: Bearer <session_id>` (or `session_id` in the JSON body). Tip: with `php -S`, if Bearer is ignored, use header `X-Session-Token: <session_id>` or ensure you log in against the same running server (new `login` = new token). If the token vanishes after deploy or between requests, do not set `SESSION_MEMORY_SYNC_FILE=` empty unless you want RAM-only storage; default is a `.data/session-memory.json` file.'
api.error.character_not_found: 'No character for this account; use `register` first.'
