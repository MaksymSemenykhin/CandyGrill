# API response and validation messages — English (default / fallback)
api.bootstrap.message: 'Phase 1.9: POST JSON `command` — `register`, `login`, `me` (Bearer), `find_opponents`, `start_combat`, `combat_attack`, `ping`, `health`, session_*. Next: claim prize.'
api.error.method_not_allowed: 'Use POST with application/json or application/x-www-form-urlencoded.'
