openapi: 3.0.3
info:
  title: CandyGrill
  version: 1.6.13

servers:
  - url: http://127.0.0.1:8080

tags:
  - name: Commands

paths:
  /:
    post:
      tags: [Commands]
      summary: POST /
      operationId: postCommand
      parameters:
        - $ref: '#/components/parameters/LocaleQuery'
        - $ref: '#/components/parameters/LangQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/RegisterRequest'
                - $ref: '#/components/schemas/LoginRequest'
              discriminator:
                propertyName: command
                mapping:
                  register: '#/components/schemas/RegisterRequest'
                  login: '#/components/schemas/LoginRequest'
            examples:
              register:
                summary: 'Шаблон: register'
                value:
                  command: register
                  name: MyHero
              login:
                summary: 'Шаблон: login'
                value:
                  command: login
                  player_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d

          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: '#/components/schemas/RegisterRequest'
                - $ref: '#/components/schemas/LoginRequest'
              discriminator:
                propertyName: command
                mapping:
                  register: '#/components/schemas/RegisterRequest'
                  login: '#/components/schemas/LoginRequest'
            examples:
              register:
                summary: 'Шаблон: register (form)'
                value:
                  command: register
                  name: MyHero
              login:
                summary: 'Шаблон: login (form)'
                value:
                  command: login
                  player_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d

      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RegisterOk'
                  - $ref: '#/components/schemas/LoginOk'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

components:
  parameters:
    LocaleQuery:
      name: locale
      in: query
      required: false
      schema:
        type: string
        enum: [en, ru]
    LangQuery:
      name: lang
      in: query
      required: false
      schema:
        type: string
        enum: [en, ru]

  schemas:
    RegisterRequest:
      type: object
      required: [command, name]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [register]
        name:
          type: string
          minLength: 1
          maxLength: 64
        locale:
          type: string
          enum: [en, ru]
        lang:
          type: string
          enum: [en, ru]

    LoginRequest:
      type: object
      required: [command, player_id]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [login]
        player_id:
          type: string
          format: uuid
        locale:
          type: string
          enum: [en, ru]
        lang:
          type: string
          enum: [en, ru]

    RegisterOk:
      type: object
      required: [ok, data, locale]
      properties:
        ok:
          type: boolean
          example: true
        locale:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [player_id]
          additionalProperties: false
          properties:
            player_id:
              type: string
              format: uuid

    LoginOk:
      type: object
      required: [ok, data, locale]
      properties:
        ok:
          type: boolean
          example: true
        locale:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [session_id, expires_in]
          additionalProperties: false
          properties:
            session_id:
              type: string
              description: Токен сессии (64 hex); в заголовке — `Authorization: Bearer <session_id>`.
            expires_in:
              type: integer

    ErrorBody:
      type: object
      required: [ok, error, locale]
      properties:
        ok:
          type: boolean
          example: false
        locale:
          type: string
          enum: [en, ru]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
