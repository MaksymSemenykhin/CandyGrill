openapi: 3.0.3
info:
  title: CandyGrill
  version: 2.1.0
  description: |
    **Session:** after `login`, click **Authorize** and paste the 64 hex chars from `data.session_id` (Swagger adds `Authorization: Bearer …`).

    For `register` / `login`, call the API without Authorize (or click Logout). Flow: `start_combat` → `combat_attack` (until finished) → `claim` (initiator).

# Relative URL: Swagger UI and clients use the same host you opened in the browser (VPS IP, localhost, etc.).
servers:
  - url: /

security:
  - sessionBearer: []

tags:
  - name: Commands

paths:
  /:
    post:
      tags: [Commands]
      summary: POST /
      operationId: postCommand
      description: >-
        For session commands (`me`, `find_opponents`, `start_combat`, `combat_attack`, `claim`, …) click **Authorize** and paste `session_id` from `login` (64 hex, no `Bearer` prefix).
      parameters:
        - $ref: '#/components/parameters/LangQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/RegisterRequest'
                - $ref: '#/components/schemas/LoginRequest'
                - $ref: '#/components/schemas/MeRequest'
                - $ref: '#/components/schemas/FindOpponentsRequest'
                - $ref: '#/components/schemas/StartCombatRequest'
                - $ref: '#/components/schemas/CombatAttackRequest'
                - $ref: '#/components/schemas/ClaimRequest'
              discriminator:
                propertyName: command
                mapping:
                  register: '#/components/schemas/RegisterRequest'
                  login: '#/components/schemas/LoginRequest'
                  me: '#/components/schemas/MeRequest'
                  find_opponents: '#/components/schemas/FindOpponentsRequest'
                  start_combat: '#/components/schemas/StartCombatRequest'
                  combat_attack: '#/components/schemas/CombatAttackRequest'
                  claim: '#/components/schemas/ClaimRequest'
            examples:
              register:
                summary: 'Template: register'
                value:
                  command: register
                  name: MyHero
              login:
                summary: 'Template: login'
                value:
                  command: login
                  player_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
              me:
                summary: 'Template: me (needs Bearer session_id)'
                value:
                  command: me
              find_opponents:
                summary: 'Template: find_opponents (needs Bearer session_id)'
                value:
                  command: find_opponents
              start_combat:
                summary: 'Template: start_combat (needs Bearer)'
                value:
                  command: start_combat
                  opponent_player_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
              combat_attack:
                summary: 'Template: combat_attack (needs Bearer)'
                value:
                  command: combat_attack
                  combat_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
                  skill: 1
              claim:
                summary: 'Template: claim (needs Bearer)'
                value:
                  command: claim
                  combat_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d

          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: '#/components/schemas/RegisterRequest'
                - $ref: '#/components/schemas/LoginRequest'
                - $ref: '#/components/schemas/MeRequest'
                - $ref: '#/components/schemas/FindOpponentsRequest'
                - $ref: '#/components/schemas/StartCombatRequest'
                - $ref: '#/components/schemas/CombatAttackRequest'
                - $ref: '#/components/schemas/ClaimRequest'
              discriminator:
                propertyName: command
                mapping:
                  register: '#/components/schemas/RegisterRequest'
                  login: '#/components/schemas/LoginRequest'
                  me: '#/components/schemas/MeRequest'
                  find_opponents: '#/components/schemas/FindOpponentsRequest'
                  start_combat: '#/components/schemas/StartCombatRequest'
                  combat_attack: '#/components/schemas/CombatAttackRequest'
                  claim: '#/components/schemas/ClaimRequest'
            examples:
              register:
                summary: 'Template: register (form)'
                value:
                  command: register
                  name: MyHero
              login:
                summary: 'Template: login (form)'
                value:
                  command: login
                  player_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
              me:
                summary: 'Template: me (form)'
                value:
                  command: me
              find_opponents:
                summary: 'Template: find_opponents (form)'
                value:
                  command: find_opponents
              start_combat:
                summary: 'Template: start_combat (form)'
                value:
                  command: start_combat
                  opponent_player_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
              combat_attack:
                summary: 'Template: combat_attack (form)'
                value:
                  command: combat_attack
                  combat_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
                  skill: 1
              claim:
                summary: 'Template: claim (form)'
                value:
                  command: claim
                  combat_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d

      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RegisterOk'
                  - $ref: '#/components/schemas/LoginOk'
                  - $ref: '#/components/schemas/MeOk'
                  - $ref: '#/components/schemas/FindOpponentsOk'
                  - $ref: '#/components/schemas/StartCombatOk'
                  - $ref: '#/components/schemas/CombatAttackOk'
                  - $ref: '#/components/schemas/ClaimOk'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '409':
          description: Conflict (e.g. combat already finished or wrong turn)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

components:
  securitySchemes:
    sessionBearer:
      type: http
      scheme: bearer
      bearerFormat: session_id
      description: >-
        Value of `data.session_id` after `login` (exactly 64 hex chars). Enter hex only — Swagger adds the `Bearer ` prefix.
        Outside Swagger you may send the same token via `X-Session-Token` or JSON body field `session_id`; the server accepts both.

  parameters:
    LangQuery:
      name: lang
      in: query
      required: false
      schema:
        type: string
        enum: [en, ru]

  schemas:
    RegisterRequest:
      type: object
      required: [command, name]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [register]
        name:
          type: string
          minLength: 1
          maxLength: 64
        lang:
          type: string
          enum: [en, ru]

    LoginRequest:
      type: object
      required: [command, player_id]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [login]
        player_id:
          type: string
          format: uuid
        lang:
          type: string
          enum: [en, ru]

    MeRequest:
      type: object
      required: [command]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [me]
        lang:
          type: string
          enum: [en, ru]
        session_id:
          type: string
          description: Optional; otherwise use Authorization Bearer header.

    FindOpponentsRequest:
      type: object
      required: [command]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [find_opponents]
        lang:
          type: string
          enum: [en, ru]
        session_id:
          type: string
          description: Optional; otherwise use Authorization Bearer header.

    StartCombatRequest:
      type: object
      required: [command, opponent_player_id]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [start_combat]
        opponent_player_id:
          type: string
          format: uuid
          description: Public id of the opponent (from find_opponents or register).
        lang:
          type: string
          enum: [en, ru]
        session_id:
          type: string
          description: Optional; otherwise use Authorization Bearer header.

    CombatAttackRequest:
      type: object
      required: [command, combat_id, skill]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [combat_attack]
        combat_id:
          type: string
          format: uuid
          description: From `start_combat` response.
        skill:
          type: integer
          enum: [1, 2, 3]
          description: Skill index; must respect repeat/copy rules.
        lang:
          type: string
          enum: [en, ru]
        session_id:
          type: string
          description: Optional; otherwise use Authorization Bearer header.

    ClaimRequest:
      type: object
      required: [command, combat_id]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [claim]
        combat_id:
          type: string
          format: uuid
          description: Finished combat from `start_combat` / `combat_attack`.
        lang:
          type: string
          enum: [en, ru]
        session_id:
          type: string
          description: Optional; otherwise use Authorization Bearer header.

    RegisterOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [player_id]
          additionalProperties: false
          properties:
            player_id:
              type: string
              format: uuid

    LoginOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [session_id, expires_in]
          additionalProperties: false
          properties:
            session_id:
              type: string
              description: >-
                Session token (64 hex); send as `Authorization: Bearer <session_id>`.
            expires_in:
              type: integer

    MeOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required:
            - player_id
            - name
            - level
            - fights
            - fights_won
            - coins
            - skill_1
            - skill_2
            - skill_3
          additionalProperties: false
          properties:
            player_id:
              type: string
              format: uuid
            name:
              type: string
            level:
              type: integer
              minimum: 1
            fights:
              type: integer
              minimum: 0
            fights_won:
              type: integer
              minimum: 0
            coins:
              type: integer
              minimum: 0
            skill_1:
              type: integer
              minimum: 0
              maximum: 50
            skill_2:
              type: integer
              minimum: 0
              maximum: 50
            skill_3:
              type: integer
              minimum: 0
              maximum: 50

    FindOpponentsOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [opponents]
          additionalProperties: false
          properties:
            opponents:
              type: array
              minItems: 1
              maxItems: 2
              items:
                type: object
                required: [player_id, name]
                additionalProperties: false
                properties:
                  player_id:
                    type: string
                    format: uuid
                  name:
                    type: string

    StartCombatOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required:
            - combat_id
            - opponent
            - first_striker
            - your_score
            - opponent_score
            - combat_finished
            - coins_won
          additionalProperties: false
          properties:
            combat_id:
              type: string
              format: uuid
              description: Use in future attack / claim commands.
            opponent:
              type: object
              required: [player_id, skill_1, skill_2, skill_3]
              additionalProperties: false
              properties:
                player_id:
                  type: string
                  format: uuid
                skill_1:
                  type: integer
                  minimum: 0
                  maximum: 50
                skill_2:
                  type: integer
                  minimum: 0
                  maximum: 50
                skill_3:
                  type: integer
                  minimum: 0
                  maximum: 50
            first_striker:
              type: string
              enum: [you, opponent]
              description: Who attacks first (random).
            your_score:
              type: integer
              minimum: 0
            opponent_score:
              type: integer
              minimum: 0
            combat_finished:
              type: boolean
            coins_won:
              nullable: true
              type: integer
              minimum: 0
              description: Set when `combat_finished` (TZ request #4); banked on `claim`.
            opponent_first_move:
              type: object
              nullable: true
              required: [skill, points]
              additionalProperties: false
              properties:
                skill:
                  type: integer
                  enum: [1, 2, 3]
                points:
                  type: integer
                  minimum: 0

    CombatAttackOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required:
            - your_move
            - opponent_move
            - your_score
            - opponent_score
            - combat_finished
            - coins_won
          additionalProperties: false
          properties:
            your_move:
              type: object
              required: [skill, points]
              additionalProperties: false
              properties:
                skill:
                  type: integer
                  enum: [1, 2, 3]
                points:
                  type: integer
                  minimum: 0
            opponent_move:
              nullable: true
              type: object
              required: [skill, points]
              additionalProperties: false
              properties:
                skill:
                  type: integer
                  enum: [1, 2, 3]
                points:
                  type: integer
                  minimum: 0
            your_score:
              type: integer
              minimum: 0
            opponent_score:
              type: integer
              minimum: 0
            combat_finished:
              type: boolean
            coins_won:
              nullable: true
              type: integer
              minimum: 0
              description: Shown when `combat_finished`; coins move to balance on `claim`.

    ClaimOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [combat_id, won, coins_received, changes, character]
          additionalProperties: false
          properties:
            combat_id:
              type: string
              format: uuid
            won:
              type: boolean
            coins_received:
              type: integer
              minimum: 0
            changes:
              type: object
              required: [fights, fights_won, coins, level]
              additionalProperties: false
              properties:
                fights:
                  type: integer
                  minimum: 0
                fights_won:
                  type: integer
                  minimum: 0
                coins:
                  type: integer
                  minimum: 0
                level:
                  type: integer
                  minimum: 0
                  description: Level increase from this `claim` (0 or more; default rules +1 every 3 lifetime wins).
            character:
              type: object
              required:
                - player_id
                - name
                - level
                - fights
                - fights_won
                - coins
                - skill_1
                - skill_2
                - skill_3
              additionalProperties: false
              properties:
                player_id:
                  type: string
                  format: uuid
                name:
                  type: string
                level:
                  type: integer
                  minimum: 1
                fights:
                  type: integer
                  minimum: 0
                fights_won:
                  type: integer
                  minimum: 0
                coins:
                  type: integer
                  minimum: 0
                skill_1:
                  type: integer
                skill_2:
                  type: integer
                skill_3:
                  type: integer

    ErrorBody:
      type: object
      required: [ok, error, lang]
      properties:
        ok:
          type: boolean
          example: false
        lang:
          type: string
          enum: [en, ru]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
