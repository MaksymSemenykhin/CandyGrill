openapi: 3.0.3
info:
  title: CandyGrill
  version: 1.7.4
  description: |
    **Session:** after `login`, click **Authorize** and paste the 64 hex chars from `data.session_id` (Swagger adds `Authorization: Bearer …`).

    For `register` / `login`, call the API without Authorize (or click Logout).

servers:
  - url: http://127.0.0.1:8080

# Avoid unnecessary `{}` at operation level — Swagger UI may stop sending Authorization.
security:
  - sessionBearer: []

tags:
  - name: Commands

paths:
  /:
    post:
      tags: [Commands]
      summary: POST /
      operationId: postCommand
      description: >-
        For session commands (`find_opponents`, …) click **Authorize** and paste `session_id` from `login` (64 hex, no `Bearer` prefix).
      parameters:
        - $ref: '#/components/parameters/LangQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/RegisterRequest'
                - $ref: '#/components/schemas/LoginRequest'
                - $ref: '#/components/schemas/FindOpponentsRequest'
              discriminator:
                propertyName: command
                mapping:
                  register: '#/components/schemas/RegisterRequest'
                  login: '#/components/schemas/LoginRequest'
                  find_opponents: '#/components/schemas/FindOpponentsRequest'
            examples:
              register:
                summary: 'Template: register'
                value:
                  command: register
                  name: MyHero
              login:
                summary: 'Template: login'
                value:
                  command: login
                  player_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
              find_opponents:
                summary: 'Template: find_opponents (needs Bearer session_id)'
                value:
                  command: find_opponents

          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: '#/components/schemas/RegisterRequest'
                - $ref: '#/components/schemas/LoginRequest'
                - $ref: '#/components/schemas/FindOpponentsRequest'
              discriminator:
                propertyName: command
                mapping:
                  register: '#/components/schemas/RegisterRequest'
                  login: '#/components/schemas/LoginRequest'
                  find_opponents: '#/components/schemas/FindOpponentsRequest'
            examples:
              register:
                summary: 'Template: register (form)'
                value:
                  command: register
                  name: MyHero
              login:
                summary: 'Template: login (form)'
                value:
                  command: login
                  player_id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
              find_opponents:
                summary: 'Template: find_opponents (form)'
                value:
                  command: find_opponents

      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RegisterOk'
                  - $ref: '#/components/schemas/LoginOk'
                  - $ref: '#/components/schemas/FindOpponentsOk'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

components:
  securitySchemes:
    sessionBearer:
      type: http
      scheme: bearer
      bearerFormat: session_id
      description: >-
        Value of `data.session_id` after `login` (exactly 64 hex chars). Enter hex only — Swagger adds the `Bearer ` prefix.
        Outside Swagger you may send the same token via `X-Session-Token` or JSON body field `session_id`; the server accepts both.

  parameters:
    LangQuery:
      name: lang
      in: query
      required: false
      schema:
        type: string
        enum: [en, ru]

  schemas:
    RegisterRequest:
      type: object
      required: [command, name]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [register]
        name:
          type: string
          minLength: 1
          maxLength: 64
        lang:
          type: string
          enum: [en, ru]

    LoginRequest:
      type: object
      required: [command, player_id]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [login]
        player_id:
          type: string
          format: uuid
        lang:
          type: string
          enum: [en, ru]

    FindOpponentsRequest:
      type: object
      required: [command]
      additionalProperties: false
      properties:
        command:
          type: string
          enum: [find_opponents]
        lang:
          type: string
          enum: [en, ru]
        session_id:
          type: string
          description: Optional; otherwise use Authorization Bearer header.

    RegisterOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [player_id]
          additionalProperties: false
          properties:
            player_id:
              type: string
              format: uuid

    LoginOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [session_id, expires_in]
          additionalProperties: false
          properties:
            session_id:
              type: string
              description: >-
                Session token (64 hex); send as `Authorization: Bearer <session_id>`.
            expires_in:
              type: integer

    FindOpponentsOk:
      type: object
      required: [ok, data, lang]
      properties:
        ok:
          type: boolean
          example: true
        lang:
          type: string
          enum: [en, ru]
        data:
          type: object
          required: [opponents]
          additionalProperties: false
          properties:
            opponents:
              type: array
              minItems: 1
              maxItems: 2
              items:
                type: object
                required: [player_id, name]
                additionalProperties: false
                properties:
                  player_id:
                    type: string
                    format: uuid
                  name:
                    type: string

    ErrorBody:
      type: object
      required: [ok, error, lang]
      properties:
        ok:
          type: boolean
          example: false
        lang:
          type: string
          enum: [en, ru]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
