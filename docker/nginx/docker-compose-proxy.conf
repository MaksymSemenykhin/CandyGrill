# In `http {}` (conf.d). Proxy to `app:8080` with short cache for anonymous GET/HEAD only.

map $request_method $skip_method {
    GET     0;
    HEAD    0;
    default 1;
}

map $http_authorization $skip_auth {
    default 0;
    ~^.+$  1;
}

map $http_x_session_token $skip_sess {
    default 0;
    ~^.+$  1;
}

map "$skip_method$skip_auth$skip_sess" $skip_proxy_cache {
    default 0;
    ~1      1;
}

proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=128m inactive=10m use_temp_path=off;

upstream candygrill_app {
    server app:8080;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2M;

    location / {
        proxy_pass http://candygrill_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Session-Token $http_x_session_token;

        proxy_read_timeout 60s;

        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 302 1m;
        proxy_cache_valid 404 30s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_key "$scheme$request_method$host$request_uri$args";

        proxy_no_cache $skip_proxy_cache;
        proxy_cache_bypass $skip_proxy_cache;

        add_header X-Cache-Status $upstream_cache_status always;
    }
}
